<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CodeLexicon - Pro Max</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CodeLexicon">
    
    <link rel="icon" href="https://img.icons8.com/fluency/48/book.png" type="image/png">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/144/book.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        [x-cloak] { display: none !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        body { 
            padding-top: env(safe-area-inset-top); 
            padding-bottom: env(safe-area-inset-bottom); 
            min-height: 100vh;
        }
        .drag-over {
            border: 2px dashed #60a5fa !important;
            background-color: rgba(96, 165, 250, 0.1) !important;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans" x-data="lexiconApp">

    <header class="bg-gradient-to-r from-slate-900 to-indigo-900 text-white p-5 shadow-xl sticky top-0 z-50">
        <div class="container mx-auto flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <a href="builder.html" class="bg-white/10 hover:bg-white/20 text-white px-3 py-1.5 rounded-lg text-sm font-bold transition flex items-center gap-1 border border-white/20 shadow-sm" title="ビルダーへ移動">
                    <span>🛠️</span> CodeBuilder
                </a>
                <a href="runner.html" class="bg-rose-500/10 hover:bg-rose-500/20 text-rose-200 px-3 py-1.5 rounded-lg text-sm font-bold transition flex items-center gap-1 border border-rose-500/30 shadow-sm ring-1 ring-rose-500/20" title="デバッガーを起動">
        <span class="animate-pulse">🚀</span> CodeRunner
    </a>
                <h1 class="text-2xl font-black italic tracking-tighter flex items-center gap-2">
                    <span class="bg-blue-500 text-white px-2 py-1 rounded text-xl">&lt;/&gt;</span>
                    CODE<span class="text-blue-400">LEXICON</span>
                </h1>
            </div>
            
            <div class="flex items-center gap-4 flex-1 justify-end min-w-[300px]">
                <div class="flex flex-col items-end">
                    <span class="text-[10px] text-blue-200">Gemini API Key:</span>
                    <input type="password" x-model="apiKey" class="bg-white/10 border border-white/20 p-2 rounded text-white text-xs focus:bg-white/20 outline-none w-full max-w-[200px]" placeholder="APIキーをセット...">
                </div>
                <div class="flex gap-2">
                    <button @click="exportJSON()" class="bg-white/10 hover:bg-white/20 p-2.5 rounded shadow transition" title="JSON書き出し">📤</button>
                    <button @click="$refs.fileInput.click()" class="bg-white/10 hover:bg-white/20 p-2.5 rounded shadow transition" title="JSON読み込み">📥</button>
                    <input type="file" x-ref="fileInput" @change="importJSON($event)" class="hidden" accept=".json">
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto mt-6 p-4 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <aside class="lg:col-span-4 bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200 flex flex-col h-[calc(100vh-160px)]">
            <div class="p-4 bg-slate-100 border-b space-y-3">
                <div class="flex justify-between items-center">
                    <h2 class="font-bold text-xs uppercase text-slate-500 tracking-widest">Master Database</h2>
                    <span class="text-[10px] bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full font-bold" x-text="dictionary.length + ' 項目'"></span>
                </div>
                <div class="flex gap-2">
                    <select x-model="filter" class="text-xs p-2 rounded-lg border bg-white outline-none flex-1 font-bold text-slate-600">
                        <option value="all">すべて表示</option>
                        <option value="basic">主要・基本</option>
                        <option value="useful">実務・便利</option>
                        <option value="advanced">高度・マニアック</option>
                        <option value="AI解説">AI解説</option>
                    </select>
                </div>
                <input type="text" x-model="searchQuery" placeholder="キーワードで検索..." class="w-full p-2.5 text-sm border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            
            <div class="flex-1 overflow-y-auto custom-scrollbar">
                <template x-for="item in filteredDictionary" :key="item.id">
                    <div class="group relative border-b border-slate-50 transition-colors">
                        <div @click="selectItem(item)" 
                             class="p-4 cursor-pointer transition border-l-4"
                             :class="{
                                 'bg-blue-100 border-blue-600': displayItem?.id === item.id,
                                 'bg-blue-50/30 hover:bg-blue-100/50 border-transparent': displayItem?.id !== item.id && item.cat === 'basic',
                                 'bg-emerald-50/30 hover:bg-emerald-100/50 border-transparent': displayItem?.id !== item.id && item.cat === 'useful',
                                 'bg-purple-50/30 hover:bg-purple-100/50 border-transparent': displayItem?.id !== item.id && item.cat === 'advanced',
                                 'bg-orange-50/30 hover:bg-orange-100/50 border-transparent': displayItem?.id !== item.id && item.cat === 'AI解説'
                             }">
                            <div class="flex justify-between items-start mb-1">
                                <span class="text-[10px] font-black px-2 py-0.5 rounded bg-slate-200 text-slate-600 group-hover:bg-blue-600 group-hover:text-white transition" x-text="item.lang"></span>
                                <span class="text-[10px] text-slate-400 font-bold uppercase" x-text="item.cat"></span>
                            </div>
                            <div class="font-bold text-slate-700 truncate" x-text="item.title"></div>
                        </div>
                        <button @click.stop="deleteItem(item.id)" class="absolute right-2 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 p-2 text-red-400 hover:text-red-600 transition bg-white/80 rounded-full shadow-sm">
                            🗑️
                        </button>
                    </div>
                </template>
                <div x-show="filteredDictionary.length === 0" class="p-10 text-center text-slate-400 italic text-sm">
                    該当する項目がありません
                </div>
            </div>
        </aside>

        <section class="lg:col-span-8 space-y-6">
            
            <div class="bg-slate-900 rounded-3xl p-6 shadow-2xl relative overflow-hidden ring-4 ring-slate-800">
                <div class="flex justify-between items-center mb-4 z-10 relative">
                    <h3 class="text-white font-bold flex items-center gap-2">
                        <span class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></span>
                        AIコード解読 & テンプレ抽出
                    </h3>
                    <button @click="$refs.codeUpload.click()" class="text-[10px] bg-slate-700 hover:bg-slate-600 text-white px-3 py-1.5 rounded-lg transition shadow border border-slate-600">
                        📁 ファイルを選択
                    </button>
                    <input type="file" x-ref="codeUpload" @change="handleFileUpload($event)" class="hidden">
                </div>

                <div class="relative z-10" @dragover.prevent="isDragging = true" @dragleave.prevent="isDragging = false" @drop.prevent="handleFileDrop($event)">
                    <textarea x-model="userInput" class="w-full h-48 bg-slate-800 text-green-400 p-4 font-mono text-sm rounded-2xl border border-slate-700 outline-none focus:ring-2 focus:ring-blue-400 transition custom-scrollbar" :class="{ 'drag-over': isDragging }" placeholder="// ここにコードをペースト、またはファイルをドラッグ＆ドロップ..."></textarea>
                </div>
                
                <div class="mt-4 flex gap-3 relative z-10 flex-col sm:flex-row">
                    <button @click="analyzeFullCode()" :disabled="isWorking || !userInput" class="flex-1 bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 text-white font-black py-3 rounded-xl transition shadow-lg flex items-center justify-center gap-2 active:scale-95">
                        <span x-show="!isWorking">⚡ コードを解説させる</span>
                        <span x-show="isWorking" class="flex items-center gap-2">
                            <svg class="animate-spin h-4 w-4 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                            解析中...
                        </span>
                    </button>
                    <button @click="extractTemplatesFromCode()" :disabled="isWorking || !userInput" class="flex-1 bg-teal-600 hover:bg-teal-500 disabled:bg-slate-700 text-white font-black py-3 rounded-xl transition shadow-lg flex items-center justify-center gap-2 active:scale-95">
                        <span x-show="!isWorking">🧩 テンプレを抽出 (Builderへ)</span>
                        <span x-show="isWorking">抽出中...</span>
                    </button>
                </div>
            </div>

            <div x-show="extractedTemplates.length > 0" class="bg-white rounded-3xl p-6 shadow-xl border-2 border-teal-400 animate-in fade-in slide-in-from-bottom-4 duration-300" x-transition x-cloak>
                <div class="flex items-center justify-between mb-4">
                    <h4 class="font-black text-teal-600 flex items-center gap-2">
                        <span class="text-xl">🧩</span> 抽出されたテンプレート
                    </h4>
                    <button @click="extractedTemplates = []" class="text-xs text-slate-400 hover:text-slate-600 font-bold bg-slate-100 px-2 py-1 rounded">閉じる ✖</button>
                </div>
                <div class="space-y-4">
                    <template x-for="(temp, index) in extractedTemplates" :key="index">
                        <div class="border border-slate-100 rounded-2xl p-4 bg-slate-50 shadow-sm">
                            <div class="flex justify-between items-start mb-3">
                                <div>
                                    <div class="flex gap-1 mb-1">
                                        <span class="text-[10px] font-black px-2 py-0.5 rounded bg-blue-100 text-blue-700" x-text="temp.lang"></span>
                                        <span class="text-[10px] font-black px-2 py-0.5 rounded bg-teal-100 text-teal-700" x-text="temp.category"></span>
                                    </div>
                                    <h5 class="font-bold text-slate-800" x-text="temp.title"></h5>
                                </div>
                                <button @click="saveToBuilder(temp)" class="bg-teal-600 hover:bg-teal-500 text-white text-xs font-black px-4 py-2 rounded-lg shadow-md transition active:scale-95 flex items-center gap-1">
                                    <span>💾</span> Builderに保存
                                </button>
                            </div>
                            <pre class="bg-slate-900 text-teal-300 p-4 rounded-xl text-xs overflow-x-auto custom-scrollbar border border-slate-800"><code x-text="temp.code"></code></pre>
                        </div>
                    </template>
                </div>
            </div>

            <div x-show="displayItem" class="bg-white rounded-3xl p-8 shadow-2xl border-t-8 border-blue-500 animate-in fade-in duration-500" x-transition x-cloak>
                <div class="flex flex-col md:flex-row justify-between items-start border-b border-slate-100 pb-6 mb-6 gap-4">
                    <div>
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-blue-600 font-black text-[10px] uppercase px-2 py-0.5 bg-blue-50 rounded border border-blue-100" x-text="displayItem?.lang"></span>
                            <span x-show="displayItem?.isAIResult" class="text-[10px] text-amber-600 font-black bg-amber-50 px-2 py-0.5 rounded border border-amber-100">AI ANALYZED</span>
                        </div>
                        <h2 class="text-3xl font-black text-slate-800 tracking-tight" x-text="displayItem?.title"></h2>
                    </div>
                    <button x-show="displayItem?.isAIResult" @click="saveToDatabase()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-black py-4 px-8 rounded-2xl transition shadow-xl hover:-translate-y-1 active:scale-95 flex items-center gap-2">
                        <span>📚</span> 辞書に保存する
                    </button>
                </div>
                
                <div x-show="displayItem?.code" class="bg-slate-900 p-6 rounded-2xl mb-6 shadow-inner relative group border border-slate-800">
                    <div class="absolute top-3 right-4 text-[10px] text-slate-500 font-mono italic select-none">SOURCE CODE</div>
                    <pre class="overflow-x-auto custom-scrollbar"><code class="text-sm font-mono text-blue-300 leading-relaxed" x-text="displayItem?.code"></code></pre>
                </div>

                <div class="prose max-w-none">
                    <div class="text-slate-700 text-base leading-relaxed whitespace-pre-wrap font-medium p-6 bg-slate-50 rounded-2xl border border-slate-100 shadow-sm" x-text="displayItem?.explanation"></div>
                </div>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('lexiconApp', () => ({
                apiKey: localStorage.getItem('lexicon_apikey') || '',
                userInput: '',
                searchQuery: '',
                filter: 'all',
                displayItem: null,
                isWorking: false,
                isDragging: false,
                dictionary: [],
                extractedTemplates: [],
                
                // 初回起動時の基本データ
                backupData: [
                    { "id": 1, "cat": "basic", "lang": "JavaScript", "title": "テンプレートリテラル", "code": "const name = 'Taro';\nconsole.log(`Hello, ${name}!`);", "explanation": "バッククォートを使うことで、文字列の中に変数を直接埋め込むことができます。" },
                    { "id": 2, "cat": "useful", "lang": "CSS", "title": "Flexbox 中央揃え", "code": ".container {\n  display: flex;\n  justify-content: center;\n  align-items: center;\n}", "explanation": "要素を上下左右ぴったり真ん中に配置するための最も一般的な手法です。" }
                ],

                init() {
                    this.$watch('apiKey', val => localStorage.setItem('lexicon_apikey', val));
                    const savedData = JSON.parse(localStorage.getItem('myCustomLexicon') || '[]');
                    // 保存済みデータとバックアップを統合
                    this.dictionary = [...savedData, ...this.backupData];
                    
                    // 重複削除 (IDベース)
                    this.dictionary = Array.from(new Map(this.dictionary.map(item => [item.id, item])).values());
                },

                get filteredDictionary() {
                    const q = (this.searchQuery || "").toLowerCase();
                    return this.dictionary.filter(item => {
                        const matchesFilter = (this.filter === 'all' || item.cat === this.filter);
                        const matchesSearch = item.title.toLowerCase().includes(q) || item.explanation.toLowerCase().includes(q);
                        return matchesFilter && matchesSearch;
                    }).sort((a, b) => b.id - a.id);
                },

                selectItem(item) {
                    this.displayItem = { ...item, isAIResult: false };
                    this.extractedTemplates = [];
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                },

                // ファイルアップロード・ドラッグ＆ドロップ
                handleFileUpload(event) {
                    const file = event.target.files[0];
                    if (file) this.readFile(file);
                },

                handleFileDrop(event) {
                    this.isDragging = false;
                    const file = event.dataTransfer.files[0];
                    if (file) this.readFile(file);
                },

                readFile(file) {
                    const reader = new FileReader();
                    reader.onload = (e) => { this.userInput = e.target.result; };
                    reader.readAsText(file);
                },

                // 🧩 テンプレート抽出
                async extractTemplatesFromCode() {
                    if (!this.apiKey) return alert("APIキーを入力してね！");
                    this.isWorking = true;
                    this.extractedTemplates = [];

                    try {
                        const prompt = `あなたはプロのエンジニアです。以下のコードの中から、今後使い回せそうなパーツをテンプレートとして抽出してください。
                        必ず以下の純粋なJSON配列のみを返してください（解説やMarkdownは不要）。

                        [
                          {
                            "title": "テンプレート名",
                            "lang": "HTML/CSS/JavaScript/Python/PHP等",
                            "category": "UIパーツ/ロジック/API通信/データ処理/その他",
                            "code": "コード内容"
                          }
                        ]

                        コード:
                        ${this.userInput}`;
                        
                        const text = await this.callGemini(prompt);
                        let jsonStr = text.replace(/```json/g, '').replace(/```/g, '').trim();
                        this.extractedTemplates = JSON.parse(jsonStr);
                        
                        if(this.extractedTemplates.length === 0) alert("抽出できるパーツが見つかりませんでした。");
                    } catch (e) {
                        alert("抽出エラー: " + e.message);
                    } finally {
                        this.isWorking = false;
                    }
                },

                // 💾 Builderへの保存 (localStorage連携)
                saveToBuilder(temp) {
                    try {
                        const savedTemplates = JSON.parse(localStorage.getItem('myCodeTemplates') || '[]');
                        const newTemp = {
                            id: Date.now() + Math.floor(Math.random() * 1000),
                            lang: temp.lang || "その他",
                            category: temp.category || "その他",
                            title: temp.title || "抽出されたテンプレート",
                            code: temp.code || ""
                        };
                        savedTemplates.unshift(newTemp);
                        localStorage.setItem('myCodeTemplates', JSON.stringify(savedTemplates));
                        alert(`「${newTemp.title}」をCodeBuilderへ送ったよ！🚀`);
                    } catch (e) {
                        alert("保存に失敗しました。");
                    }
                },

                // ⚡ 全体解説
                async analyzeFullCode() {
                    if (!this.apiKey) return alert("APIキーを入力してね！");
                    this.isWorking = true;

                    try {
                        const prompt = `以下のコードをプロの視点で解読し、構成や重要ポイントを解説してください。
                        フォーマット：
                        タイトル: [短いタイトル]
                        言語: [言語名]
                        解説: [詳しい解説]
                        
                        コード:
                        ${this.userInput}`;
                        
                        const text = await this.callGemini(prompt);
                        const titleMatch = text.match(/タイトル:\s*(.*)/);
                        const langMatch = text.match(/言語:\s*(.*)/);
                        const expSplit = text.split(/解説:\s*/);

                        this.displayItem = {
                            id: Date.now(),
                            cat: "AI解説", 
                            title: titleMatch ? titleMatch[1] : "AI解析結果",
                            lang: langMatch ? langMatch[1] : "Code",
                            code: this.userInput,
                            explanation: expSplit[1] || text,
                            isAIResult: true
                        };
                        this.extractedTemplates = [];
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    } catch (e) {
                        alert("解析エラー: " + e.message);
                    } finally {
                        this.isWorking = false;
                    }
                },

                async callGemini(prompt) {
                    const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${this.apiKey}`;
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    if (!response.ok) throw new Error("APIリクエスト失敗");
                    const data = await response.json();
                    return data.candidates[0].content.parts[0].text;
                },

                saveToDatabase() {
                    const newItem = { ...this.displayItem, isAIResult: false };
                    this.dictionary.unshift(newItem);
                    const savedItems = JSON.parse(localStorage.getItem('myCustomLexicon') || '[]');
                    savedItems.unshift(newItem);
                    localStorage.setItem('myCustomLexicon', JSON.stringify(savedItems));
                    alert("辞書に登録したよ！📖");
                    this.displayItem.isAIResult = false;
                },

                deleteItem(id) {
                    if (!confirm("本当に削除する？")) return;
                    this.dictionary = this.dictionary.filter(item => item.id !== id);
                    const savedItems = JSON.parse(localStorage.getItem('myCustomLexicon') || '[]');
                    localStorage.setItem('myCustomLexicon', JSON.stringify(savedItems.filter(i => i.id !== id)));
                    if (this.displayItem?.id === id) this.displayItem = null;
                },

                exportJSON() {
                    const savedItems = JSON.parse(localStorage.getItem('myCustomLexicon') || '[]');
                    const blob = new Blob([JSON.stringify(savedItems, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'my_lexicon.json';
                    a.click();
                },

                importJSON(event) {
                    const file = event.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const imported = JSON.parse(e.target.result);
                            const current = JSON.parse(localStorage.getItem('myCustomLexicon') || '[]');
                            const merged = [...imported, ...current];
                            const unique = Array.from(new Map(merged.map(i => [i.id, i])).values());
                            localStorage.setItem('myCustomLexicon', JSON.stringify(unique));
                            this.dictionary = [...unique, ...this.backupData];
                            alert("インポート完了！");
                        } catch (err) {
                            alert("読み込みエラー");
                        }
                    };
                    reader.readAsText(file);
                }
            }));
        });
    </script>
</body>
</html>
