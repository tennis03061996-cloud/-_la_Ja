<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CodeLexicon - Pro Max</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CodeLexicon">
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        [x-cloak] { display: none !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
        
        /* ドラッグ＆ドロップ時のスタイル */
        .drag-over {
            border: 2px dashed #60a5fa !important;
            background-color: rgba(96, 165, 250, 0.1) !important;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900" x-data="lexiconApp">

    <header class="bg-gradient-to-r from-slate-900 to-indigo-900 text-white p-5 shadow-xl sticky top-0 z-50">
        <div class="container mx-auto flex flex-wrap justify-between items-center gap-4">
            <h1 class="text-2xl font-black italic tracking-tighter flex items-center gap-2">
                <span class="bg-blue-500 text-white px-2 py-1 rounded text-xl">&lt;/&gt;</span>
                CODE<span class="text-blue-400">LEXICON</span>
            </h1>
            
            <div class="flex items-center gap-4 flex-1 justify-end min-w-[300px]">
                <div class="flex flex-col items-end">
                    <span class="text-[10px] text-blue-200">Gemini API Key:</span>
                    <input type="password" x-model="apiKey" class="bg-white/10 border border-white/20 p-2 rounded text-white text-xs focus:bg-white/20 outline-none w-full max-w-[200px]" placeholder="APIキーをセット...">
                </div>
                <div class="flex gap-2">
                    <button @click="exportJSON()" class="bg-white/10 hover:bg-white/20 p-2.5 rounded shadow transition" title="JSON書き出し">📤</button>
                    <button @click="$refs.fileInput.click()" class="bg-white/10 hover:bg-white/20 p-2.5 rounded shadow transition" title="JSON読み込み">📥</button>
                    <input type="file" x-ref="fileInput" @change="importJSON($event)" class="hidden" accept=".json">
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto mt-6 p-4 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <aside class="lg:col-span-4 bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200 flex flex-col h-[calc(100vh-160px)]">
            <div class="p-4 bg-slate-100 border-b space-y-3">
                <div class="flex justify-between items-center">
                    <h2 class="font-bold text-xs uppercase text-slate-500">Master Database</h2>
                    <span class="text-[10px] bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full font-bold" x-text="dictionary.length + ' 項目'"></span>
                </div>
                <div class="flex gap-2">
                    <select x-model="filter" class="text-xs p-2 rounded-lg border bg-white outline-none flex-1">
                        <option value="all">すべて表示</option>
                        <option value="basic">主要・基本</option>
                        <option value="useful">実務・便利</option>
                        <option value="advanced">高度・マニアック</option>
                        <option value="AI解説">AI解説</option>
                    </select>
                </div>
                <input type="text" x-model="searchQuery" placeholder="項目を検索..." class="w-full p-2.5 text-sm border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            
            <div class="flex-1 overflow-y-auto custom-scrollbar">
                <template x-for="item in filteredDictionary" :key="item.id">
                    <div class="group relative border-b border-slate-50 transition-colors">
                        <div @click="selectItem(item)" 
                             class="p-4 cursor-pointer transition border-l-4"
                             :class="{
                                 'bg-blue-100 border-blue-600': displayItem?.id === item.id,
                                 'bg-blue-50/30 hover:bg-blue-100/50 border-transparent': displayItem?.id !== item.id && item.cat === 'basic',
                                 'bg-emerald-50/30 hover:bg-emerald-100/50 border-transparent': displayItem?.id !== item.id && item.cat === 'useful',
                                 'bg-purple-50/30 hover:bg-purple-100/50 border-transparent': displayItem?.id !== item.id && item.cat === 'advanced',
                                 'bg-orange-50/30 hover:bg-orange-100/50 border-transparent': displayItem?.id !== item.id && item.cat === 'AI解説'
                             }">
                            <div class="flex justify-between items-start mb-1">
                                <span class="text-[10px] font-bold px-2 py-0.5 rounded bg-slate-200 text-slate-600 group-hover:bg-blue-600 group-hover:text-white transition" x-text="item.lang"></span>
                                <span class="text-[10px] text-slate-400 italic" x-text="item.cat"></span>
                            </div>
                            <div class="font-bold text-slate-700 truncate" x-text="item.title"></div>
                        </div>
                        <button @click.stop="deleteItem(item.id)" class="absolute right-2 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 p-2 text-red-400 hover:text-red-600 transition bg-white/80 rounded-full shadow-sm">
                            🗑️
                        </button>
                    </div>
                </template>
                <div x-show="filteredDictionary.length === 0" class="p-8 text-center text-slate-400 text-sm italic">
                    データが見つかりません
                </div>
            </div>
        </aside>

        <section class="lg:col-span-8 space-y-6">
            
            <div class="bg-slate-900 rounded-3xl p-6 shadow-2xl relative overflow-hidden ring-4 ring-slate-800">
                <div x-show="uploadMessage" x-transition.opacity.duration.300ms class="absolute top-4 left-1/2 transform -translate-x-1/2 bg-green-500 text-white px-4 py-1 rounded-full text-xs font-bold z-10 shadow-lg flex items-center gap-1" x-cloak>
                    <span>✅</span> <span x-text="uploadMessage"></span>
                </div>

                <div class="absolute top-0 right-0 p-4 opacity-10 font-mono text-4xl text-white select-none">AI ANALYSIS</div>
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-white font-bold flex items-center gap-2 z-10">
                        <span class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></span>
                        AIコード解読 (Model: 3-flash)
                    </h3>
                    <div class="flex gap-2 z-10">
                        <input type="file" x-ref="codeUpload" @change="handleFileUpload($event)" class="hidden">
                        <button @click="$refs.codeUpload.click()" class="text-[10px] bg-slate-700 hover:bg-slate-600 text-white px-3 py-1.5 rounded-lg border border-slate-600 transition shadow">
                            📁 ファイル選択
                        </button>
                    </div>
                </div>

                <div 
                    class="relative z-10"
                    @dragover.prevent="isDragging = true"
                    @dragleave.prevent="isDragging = false"
                    @drop.prevent="handleFileDrop($event)"
                >
                    <textarea 
                        x-model="userInput" 
                        @input="onCodeInput()" 
                        class="w-full h-48 bg-slate-800 text-green-400 p-4 font-mono text-sm rounded-2xl border border-slate-700 outline-none focus:ring-2 focus:ring-blue-400 transition" 
                        :class="{ 'drag-over': isDragging }"
                        placeholder="// ここにコードをペースト、またはファイルをドラッグ＆ドロップ..."
                    ></textarea>
                    <div x-show="isDragging" class="absolute inset-0 bg-blue-500/20 rounded-2xl flex items-center justify-center pointer-events-none border-2 border-blue-400 border-dashed backdrop-blur-sm" x-cloak>
                        <span class="text-white font-bold text-lg bg-slate-900/80 px-6 py-2 rounded-full">ファイルをドロップして読み込む</span>
                    </div>
                </div>
                
                <div class="mt-4 flex gap-3 relative z-10">
                    <button @click="analyzeFullCode()" :disabled="isWorking || !userInput" class="flex-1 bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 text-white font-black py-4 rounded-2xl transition shadow-lg flex items-center justify-center gap-2 active:scale-[0.98]">
                        <span x-show="!isWorking">⚡ AIに全体を解説させる</span>
                        <span x-show="isWorking" class="flex items-center gap-2 italic">
                            <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                            AIが思考を巡らせています...
                        </span>
                    </button>
                </div>
            </div>

            <div x-show="keywords.length > 0" class="bg-white rounded-3xl p-6 shadow-xl border border-slate-200" x-transition x-cloak>
                <h4 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">検出された重要キーワード（タップで解説）</h4>
                <div class="flex flex-wrap gap-2">
                    <template x-for="word in keywords" :key="word">
                        <button @click="fetchWordDetail(word)" 
                                class="px-3 py-1.5 rounded-full text-sm font-bold transition flex items-center gap-1 border border-blue-100 hover:scale-105 active:scale-95"
                                :class="isInDictionary(word) ? 'bg-blue-50 text-blue-700 hover:bg-blue-100' : 'bg-slate-50 text-slate-600 hover:bg-slate-200'">
                            <span x-text="word"></span>
                            <span x-show="isInDictionary(word)" class="text-[10px]">📖</span>
                            <span x-show="!isInDictionary(word)" class="text-[10px]">✨</span>
                        </button>
                    </template>
                </div>
            </div>

            <div x-show="displayItem" class="bg-white rounded-3xl p-8 shadow-2xl border-t-4 border-blue-500" x-transition x-cloak>
                <div class="flex flex-col md:flex-row justify-between items-start border-b pb-6 mb-6 gap-4">
                    <div>
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-blue-600 font-black text-xs uppercase px-2 py-0.5 bg-blue-50 rounded" x-text="displayItem?.lang"></span>
                            <span x-show="displayItem?.isAIResult" class="text-xs text-amber-600 font-bold bg-amber-50 px-2 py-0.5 rounded">AIの回答</span>
                        </div>
                        <h2 class="text-3xl font-black text-slate-800" x-text="displayItem?.title"></h2>
                    </div>
                    <button x-show="displayItem?.isAIResult" @click="saveToDatabase()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-black py-3 px-6 rounded-full transition shadow-xl hover:-translate-y-1 active:scale-95">
                        辞書に保存する
                    </button>
                </div>
                
                <div x-show="displayItem?.code" class="bg-slate-900 p-6 rounded-2xl mb-6 shadow-inner relative group">
                    <div class="text-[10px] absolute top-3 right-4 text-slate-500 font-mono italic underline select-none">SOURCE CODE</div>
                    
                    <button @click="copyCode()" class="absolute bottom-3 right-3 bg-slate-700/80 hover:bg-slate-600 text-white text-xs px-3 py-1.5 rounded-lg opacity-0 group-hover:opacity-100 transition flex items-center gap-1 active:scale-95 backdrop-blur-sm">
                        <span x-text="copied ? '✅ コピー完了' : '📋 コピー'"></span>
                    </button>

                    <pre class="overflow-x-auto custom-scrollbar"><code class="text-sm font-mono text-blue-300 leading-relaxed" x-text="displayItem?.code"></code></pre>
                </div>

                <div class="prose max-w-none">
                    <h4 class="font-bold text-slate-800 mb-3 flex items-center gap-2">
                        <span class="text-blue-500">📝</span> 解説
                    </h4>
                    <div class="text-slate-700 text-base leading-relaxed whitespace-pre-wrap font-medium p-5 bg-slate-50 rounded-2xl border border-slate-100" x-text="displayItem?.explanation"></div>
                </div>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('lexiconApp', () => ({
                apiKey: localStorage.getItem('lexicon_apikey') || '',
                userInput: '',
                searchQuery: '',
                filter: 'all',
                displayItem: null,
                isWorking: false,
                isDragging: false,
                uploadMessage: '',
                copied: false,
                dictionary: [],
                keywords: [],
                
                // 🟢 省略なしの100件データ
                backupData: [
                    { "id": 1, "cat": "basic", "lang": "JavaScript", "title": "テンプレートリテラル", "code": "const name = 'Taro';\nconsole.log(`Hello, ${name}!`);", "explanation": "バッククォートを使うことで、文字列の中に変数を直接埋め込むことができます。可読性が大幅に向上します。" },
                    { "id": 2, "cat": "basic", "lang": "Python", "title": "f-strings (フォーマット済み文字列)", "code": "name = 'Jiro'\nprint(f'Hello, {name}!')", "explanation": "文字列の前にfを付けることで、{}内に変数や計算式を直接記述できる、Pythonで最も推奨される書き方です。" },
                    { "id": 3, "cat": "basic", "lang": "PHP", "title": "アロー関数 (fn)", "code": "$add = fn($a, $b) => $a + $b;\necho $add(1, 2);", "explanation": "PHP 7.4から導入された短い関数記法。親スコープの変数を自動で引き継ぐため、callback関数に最適です。" },
                    { "id": 4, "cat": "useful", "lang": "JavaScript", "title": "オブジェクトの分割代入", "code": "const user = { name: 'Alice', age: 25 };\nconst { name, age } = user;", "explanation": "オブジェクトの中身を、同じ名前の変数として一気に取り出す手法です。Reactなどのモダンな開発で多用されます。" },
                    { "id": 5, "cat": "useful", "lang": "Python", "title": "リスト内包表記", "code": "nums = [x * 2 for x in range(5)]", "explanation": "既存のリストから新しいリストを1行で生成します。for文を回してappendするより高速で簡潔です。" },
                    { "id": 6, "cat": "useful", "lang": "PHP", "title": "Null合体代入演算子", "code": "$config['theme'] ??= 'default';", "explanation": "もし左辺がnullか未定義の場合にのみ、右辺の値を代入します。設定のデフォルト値指定に便利です。" },
                    { "id": 7, "cat": "advanced", "lang": "JavaScript", "title": "Async/Await (非同期処理)", "code": "async function fetchData() {\n  const res = await fetch(url);\n  const data = await res.json();\n}", "explanation": "複雑になりがちな非同期処理を、まるで同期処理（上から下へ流れる処理）のように書ける高度な構文です。" },
                    { "id": 8, "cat": "advanced", "lang": "Python", "title": "デコレータ", "code": "def log(func):\n    def wrapper():\n        print('Start')\n        func()\n    return wrapper", "explanation": "関数を書き換えずに、その前後に共通の処理（ログ出力や認証など）を追加するための高度なテクニックです。" },
                    { "id": 9, "cat": "advanced", "lang": "PHP", "title": "トレイト (Traits)", "code": "trait Logger { public function log($m) { echo $m; } }\nclass User { use Logger; }", "explanation": "多重継承ができないPHPで、複数のクラス間でメソッドを再利用するための仕組みです。" },
                    { "id": 10, "cat": "basic", "lang": "JavaScript", "title": "for...of ループ", "code": "for (const item of array) {\n  console.log(item);\n}", "explanation": "配列の要素を一つずつ取り出す最もシンプルな方法です。インデックス管理が不要でバグを防げます。" },
                    { "id": 11, "cat": "basic", "lang": "Python", "title": "例外処理 (try...except)", "code": "try:\n    res = 10 / 0\nexcept ZeroDivisionError:\n    print('Error!')", "explanation": "エラーが起きそうな場所を囲み、プログラムが強制終了するのを防ぎます。安全なアプリ作りには不可欠です。" },
                    { "id": 12, "cat": "basic", "lang": "PHP", "title": "Match式", "code": "$res = match($status) {\n  200 => 'OK',\n  404 => 'Not Found',\n  default => 'Unknown',\n};", "explanation": "PHP 8で導入。switch文より厳密で、結果を変数に直接代入できる洗練された分岐構文です。" },
                    { "id": 13, "cat": "useful", "lang": "JavaScript", "title": "スプレッド演算子", "code": "const newArr = [...oldArr, 4, 5];\nconst newObj = { ...oldObj, id: 1 };", "explanation": "配列やオブジェクトを「展開」します。元のデータを壊さずに新しいコピーを作る際によく使われます。" },
                    { "id": 14, "cat": "useful", "lang": "Python", "title": "zip関数", "code": "for n, a in zip(names, ages):\n    print(f'{n}は{a}歳')", "explanation": "2つの異なるリスト（名前リストと年齢リストなど）を同時にループで回すことができる便利な関数です。" },
                    { "id": 15, "cat": "useful", "lang": "PHP", "title": "array_column", "code": "$names = array_column($users, 'name');", "explanation": "多次元配列から、特定のキーの値だけを抜き出して1次元配列にする、データ加工の鉄板関数です。" },
                    { "id": 16, "cat": "advanced", "lang": "JavaScript", "title": "カリー化 (Currying)", "code": "const multiply = a => b => a * b;\nconst double = multiply(2);\nconsole.log(double(5)); // 10", "explanation": "複数の引数を取る関数を、1つずつ引数を取る関数の連鎖に分割する技法。関数の再利用性を高めます。" },
                    { "id": 17, "cat": "advanced", "lang": "Python", "title": "コンテキストマネージャ (with)", "code": "with open('file.txt', 'r') as f:\n    data = f.read()", "explanation": "ファイルのクローズなどの「後片付け」を自動で行う仕組み。リソース漏れを防ぐ高度な管理手法です。" },
                    { "id": 18, "cat": "advanced", "lang": "PHP", "title": "ジェネレータ (yield)", "code": "function getNums() {\n  yield 1; yield 2; yield 3;\n}", "explanation": "大量のデータを一度にメモリに載せず、必要な分だけ1つずつ生成して返す、メモリ節約のための高度な仕組みです。" },
                    { "id": 19, "cat": "basic", "lang": "JavaScript", "title": "Mapオブジェクト", "code": "const map = new Map();\nmap.set('id', 123);", "explanation": "通常のオブジェクトより高機能な連想配列。キーにオブジェクト自体を使えたり、要素数を簡単に取得できたりします。" },
                    { "id": 20, "cat": "basic", "lang": "Python", "title": "スライス表記", "code": "sub = my_list[1:4]\nreversed = my_list[::-1]", "explanation": "リストの一部を切り出したり、逆順にしたりする強力な記法。Pythonらしいコードの代表格です。" },
                    { "id": 21, "cat": "useful", "lang": "PHP", "title": "filter_var (バリデーション)", "code": "if (filter_var($email, FILTER_VALIDATE_EMAIL)) {\n  // 有効なメール形式\n}", "explanation": "メールアドレスやURLが正しい形式かどうかを一瞬で判定する、セキュリティ上非常に重要な関数です。" },
                    { "id": 22, "cat": "useful", "lang": "JavaScript", "title": "オプショナルチェイニング", "code": "const city = user?.address?.city;", "explanation": "途中のデータがnullやundefinedでもエラーにならず、安全にプロパティにアクセスできる比較の新い便利な書き方です。" },
                    { "id": 23, "cat": "useful", "lang": "Python", "title": "Counter (要素の数え上げ)", "code": "from collections import Counter\nc = Counter(['a', 'b', 'a'])", "explanation": "リストの中にどの要素が何個あるかを自動で集計するクラス。分析業務などで非常に役立ちます。" },
                    { "id": 24, "cat": "advanced", "lang": "PHP", "title": "名前付き引数", "code": "saveUser(name: 'Taro', age: 20, admin: true);", "explanation": "PHP 8から導入。引数の順番を気にせず、名前を指定して値を渡せます。関数の意味が明確になります。" },
                    { "id": 25, "cat": "advanced", "lang": "JavaScript", "title": "Proxy (プロキシ)", "code": "const p = new Proxy(target, {\n  get: (obj, prop) => { console.log('Access!'); return obj[prop]; }\n});", "explanation": "オブジェクトへのアクセスを横取りして独自の処理を挟む技術。Vue.jsの裏側などでリアクティブな動きを作るのに使われます。" },
                    { "id": 26, "cat": "advanced", "lang": "Python", "title": "メタクラス", "code": "class MyMeta(type):\n    pass\nclass MyClass(metaclass=MyMeta):", "explanation": "「クラスそのもの」を作るためのクラス。フレームワークを作成するような非常に高度なメタプログラミングで使われます。" },
                    { "id": 27, "cat": "basic", "lang": "PHP", "title": "型宣言 (Type Hinting)", "code": "function add(int $a, int $b): int {\n  return $a + $b;\n}", "explanation": "引数や戻り値に型を指定することで、意図しないデータが入るのを防ぎ、バグを早期発見します。" },
                    { "id": 28, "cat": "useful", "lang": "JavaScript", "title": "Promise.all", "code": "const results = await Promise.all([task1, task2]);", "explanation": "複数の非同期処理を同時に実行し、すべてが終わるまで待つ方法。通信時間を大幅に短縮できます。" },
                    { "id": 29, "cat": "useful", "lang": "Python", "title": "any / all 関数", "code": "if any([True, False, False]):\n    print('一つでも真！')", "explanation": "リストの中に一つでも真があるか(any)、すべて真か(all)を判定します。複雑な条件式を簡潔にします。" },
                    { "id": 30, "cat": "useful", "lang": "PHP", "title": "str_contains", "code": "if (str_contains($text, 'apple')) { ... }", "explanation": "文字列の中に特定の文字が含まれているかを判定します。以前のstrposより直感的で読みやすい関数です。" },
                    { "id": 31, "cat": "basic", "lang": "JavaScript", "title": "論理積演算子 (&&) の活用", "code": "isLoggedIn && showDashboard();", "explanation": "左側が真のときだけ右側を実行します。if文を短く書く手法としてモダンな開発でよく使われます。" },
                    { "id": 32, "cat": "basic", "lang": "Python", "title": "多重代入", "code": "a, b = 10, 20", "explanation": "複数の変数に一度に値を代入できます。2つの変数の値を入れ替える(a, b = b, a)のも1行で可能です。" },

                    { "id": 83, "cat": "advanced", "lang": "Python", "title": "プロパティ (@property)", "code": "@property\ndef age(self): return self._age", "explanation": "メソッドを「変数」のように呼び出せるようにします。値の取得時に計算やチェックを挟みたい時に有効です。" },
                    { "id": 84, "cat": "advanced", "lang": "PHP", "title": "マジックメソッド (__call)", "code": "public function __call($name, $args) { ... }", "explanation": "存在しないメソッドが呼び出された時に発動する特殊なメソッド。柔軟なプラグイン設計などに使われます。" },
                    { "id": 85, "cat": "basic", "lang": "JavaScript", "title": "数値変換 (Number)", "code": "const num = Number('123');", "explanation": "文字列の'123'を計算可能な数値の123に変換します。入力フォームの値は文字列なので変換が必須です。" },
                    { "id": 86, "cat": "basic", "lang": "Python", "title": "型変換 (int/str)", "code": "s = str(10)\nn = int('20')", "explanation": "数値と文字列を相互に変換します。Pythonは型に厳しいので、明示的な変換が重要になります。" },
                    { "id": 87, "cat": "basic", "lang": "PHP", "title": "型キャスト", "code": "$num = (int)'100';", "explanation": "変数の前に(int)と付けるだけで、強制的にその型に変換します。シンプルで使いやすい手法です。" },
                    { "id": 88, "cat": "useful", "lang": "JavaScript", "title": "console.table", "code": "console.table(users);", "explanation": "配列やオブジェクトを、ブラウザのコンソールに「表形式」で綺麗に表示します。デバッグが劇的に楽になります。" },
                    { "id": 89, "cat": "useful", "lang": "Python", "title": "mathモジュール", "code": "import math\nmath.ceil(1.2)", "explanation": "切り上げ(ceil)や四捨五入、円周率などの数学的な計算を行うための標準ライブラリです。" },
                    { "id": 90, "cat": "useful", "lang": "PHP", "title": "password_hash", "code": "password_hash('password', PASSWORD_DEFAULT);", "explanation": "パスワードを安全に暗号化（ハッシュ化）します。セキュリティ上、生のパスワード保存はNGです。" },
                    { "id": 91, "cat": "advanced", "lang": "JavaScript", "title": "タグ付きテンプレート", "code": "myTag`Hello ${name}`;", "explanation": "テンプレートリテラルを関数に渡し、特別な加工をしてから文字列にする高度な技術です。CSS-in-JSなどで使われます。" },
                    { "id": 92, "cat": "advanced", "lang": "Python", "title": "super()関数", "code": "super().__init__()", "explanation": "継承元の親クラスのメソッドを呼び出します。親の機能を活かしつつ、新しい機能を追加する際に必須です。" },
                    { "id": 93, "cat": "advanced", "lang": "PHP", "title": "インターフェース (interface)", "code": "interface Shape { public function draw(); }", "explanation": "「このクラスは絶対にこのメソッドを持つ」という契約を結びます。多人数開発での一貫性を保ちます。" },
                    { "id": 94, "cat": "basic", "lang": "JavaScript", "title": "厳密等価演算子 (!==)", "code": "if (a !== b)", "explanation": "「型まで含めて等しくない」ことを判定します。!= よりもこちらを使うのが常に安全です。" },
                    { "id": 95, "cat": "basic", "lang": "Python", "title": "コメントの書き方 (#)", "code": "# ここにメモを書く", "explanation": "プログラムの実行に関係ないメモを残します。複数行はクォート3つで囲む慣習があります。" },
                    { "id": 96, "cat": "basic", "lang": "PHP", "title": "変数の定義 ($)", "code": "$name = 'Taro';", "explanation": "PHPの変数は必ず $ 記号から始まります。英数字とアンダースコアが使用可能です。" },
                    { "id": 97, "cat": "useful", "lang": "JavaScript", "title": "Array.prototype.includes", "code": "if (arr.includes('apple'))", "explanation": "配列の中に特定の値が含まれているかをtrue/falseで返します。indexOfより読みやすいです。" },
                    { "id": 98, "cat": "useful", "lang": "Python", "title": "datetimeモジュール", "code": "from datetime import datetime\nnow = datetime.now()", "explanation": "現在時刻の取得や、日付の計算を行うための標準ライブラリです。" },
                    { "id": 99, "cat": "useful", "lang": "PHP", "title": "header関数 (リダイレクト)", "code": "header('Location: /login.php');", "explanation": "ブラウザに対して「別のページへ移動せよ」という命令を送ります。ログイン処理後などに多用します。" },
                    { "id": 100, "cat": "advanced", "lang": "JavaScript", "title": "Generator (ジェネレータ)", "code": "function* myGen() { yield 1; }", "explanation": "処理を途中で一時停止・再開できる特殊な関数です。" }
                ],

                init() {
                    this.apiKey = localStorage.getItem('lexicon_apikey') || '';
                    this.$watch('apiKey', val => localStorage.setItem('lexicon_apikey', val));
                    
                    const savedData = JSON.parse(localStorage.getItem('myCustomLexicon') || '[]');
                    this.dictionary = [...savedData, ...this.backupData];
                },

                get filteredDictionary() {
                    const q = (this.searchQuery || "").toLowerCase();
                    return this.dictionary.filter(item => {
                        const matchesFilter = (this.filter === 'all' || item.cat === this.filter);
                        const matchesSearch = item.title.toLowerCase().includes(q) || item.explanation.toLowerCase().includes(q);
                        return matchesFilter && matchesSearch;
                    });
                },

                selectItem(item) {
                    this.displayItem = { ...item, isAIResult: false };
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                },

                // 📁 ドラッグ＆ドロップ対応のファイル読み込み
                handleFileDrop(event) {
                    this.isDragging = false;
                    const file = event.dataTransfer.files[0];
                    if (!file) return;
                    
                    this.showUploadMessage(`${file.name} を読み込みました！`);
                    
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        this.userInput = e.target.result;
                        this.onCodeInput();
                    };
                    reader.readAsText(file);
                },

                handleFileUpload(event) {
                    const file = event.target.files[0];
                    if (!file) return;
                    
                    this.showUploadMessage(`${file.name} を読み込みました！`);
                    
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        this.userInput = e.target.result;
                        this.onCodeInput();
                    };
                    reader.readAsText(file);
                },
                
                showUploadMessage(msg) {
                    // 簡単なトースト通知用
                    const toast = document.createElement('div');
                    toast.className = 'fixed top-4 left-1/2 transform -translate-x-1/2 bg-green-500 text-white px-4 py-2 rounded-full shadow-lg z-50 transition-opacity duration-300';
                    toast.innerText = '✅ ' + msg;
                    document.body.appendChild(toast);
                    setTimeout(() => {
                        toast.style.opacity = '0';
                        setTimeout(() => toast.remove(), 300);
                    }, 3000);
                },

                // 📝 コード入力時に単語を抽出する
                onCodeInput() {
                    if (!this.userInput) {
                        this.keywords = [];
                        return;
                    }
                    
                    // 変数・定数宣言っぽい名前、数値、一般的な予約語を除外する
                    const reserved = ["const", "let", "var", "function", "def", "if", "else", "for", "while", "return", "class", "async", "await", "import", "export", "true", "false", "null", "undefined", "new", "this", "console", "log", "print", "echo"];
                    
                    // 2文字以上の英数字の連続を抽出
                    const words = this.userInput.match(/[a-zA-Z_]\w+/g) || [];
                    
                    // 重複を削除
                    const uniqueWords = [...new Set(words)];
                    
                    // 予約語を除外して最大30個まで表示
                    this.keywords = uniqueWords.filter(word => {
                        return word.length > 2 && !reserved.includes(word.toLowerCase());
                    }).slice(0, 30);
                },

                // 📖 辞書に単語があるかチェック
                isInDictionary(word) {
                    return this.dictionary.some(item => 
                        item.title.toLowerCase() === word.toLowerCase() || 
                        item.title.toLowerCase().includes(word.toLowerCase())
                    );
                },

                // 🔍 単語の詳細を取得（辞書 or AI）
                async fetchWordDetail(word) {
                    // 1. 辞書から探す
                    const localItem = this.dictionary.find(item => 
                        item.title.toLowerCase() === word.toLowerCase() || 
                        item.title.toLowerCase().includes(word.toLowerCase())
                    );

                    if (localItem) {
                        this.selectItem(localItem);
                        return;
                    }

                    // 2. 辞書になければAIに聞く
                    if (!this.apiKey) {
                        alert("辞書にない単語「" + word + "」を調べるには、右上にGemini APIキーを入力してね！");
                        return;
                    }

                    this.isWorking = true;
                    try {
                        const prompt = `プログラミング用語「${word}」について、初心者向けに2〜3文で分かりやすく解説してください。
                        フォーマットは以下のようにしてください。
                        タイトル: ${word}
                        言語: 関連する言語(不明ならGeneral)
                        解説: [解説文]`;
                        
                        const text = await this.callGemini(prompt);
                        
                        const titleMatch = text.match(/タイトル:\s*(.*)/);
                        const langMatch = text.match(/言語:\s*(.*)/);
                        const expSplit = text.split(/解説:\s*/);

                        this.displayItem = {
                            id: Date.now(),
                            cat: "AI解説", 
                            title: titleMatch ? titleMatch[1] : word,
                            lang: langMatch ? langMatch[1] : "Auto",
                            code: `// AIによる「${word}」の解説です`, 
                            explanation: expSplit[1] || text,
                            isAIResult: true
                        };
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    } catch (e) {
                        alert("解説の取得に失敗しました: " + e.message);
                    } finally {
                        this.isWorking = false;
                    }
                },

                // ⚡ AIによるコード全体の解説
                async analyzeFullCode() {
                    if (!this.apiKey) return alert("APIキーを入力してね！");
                    this.isWorking = true;

                    try {
                        const prompt = `以下のプログラミングコードを初心者向けに分かりやすく解説してください。
                        フォーマットは以下のようにしてください。
                        タイトル: [短いタイトル]
                        言語: [プログラミング言語名]
                        解説: [コードの主な目的と、主要な処理の流れを解説]
                        
                        コード:
                        ${this.userInput}`;
                        
                        const text = await this.callGemini(prompt);
                        
                        const titleMatch = text.match(/タイトル:\s*(.*)/);
                        const langMatch = text.match(/言語:\s*(.*)/);
                        const expSplit = text.split(/解説:\s*/);

                        this.displayItem = {
                            id: Date.now(),
                            cat: "AI解説", 
                            title: titleMatch ? titleMatch[1] : "AI解析結果",
                            lang: langMatch ? langMatch[1] : "Auto",
                            code: this.userInput,
                            explanation: expSplit[1] || text,
                            isAIResult: true
                        };
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    } catch (e) {
                        alert("解析失敗: " + e.message);
                    } finally {
                        this.isWorking = false;
                    }
                },

                async callGemini(prompt) {
                    const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${this.apiKey}`;
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error?.message || `HTTP ${response.status}`);
                    }

                    const data = await response.json();
                    return data.candidates[0].content.parts[0].text;
                },

                copyCode() {
                    if(!this.displayItem || !this.displayItem.code) return;
                    navigator.clipboard.writeText(this.displayItem.code).then(() => {
                        this.copied = true;
                        setTimeout(() => this.copied = false, 2000);
                    });
                },

                saveToDatabase() {
                    const isDuplicate = this.dictionary.some(item => 
                        item.title === this.displayItem.title
                    );
                    if (isDuplicate) return alert("この項目はもう登録されているよ！");

                    const newItem = { ...this.displayItem, isAIResult: false };
                    this.dictionary.unshift(newItem);
                    
                    try {
                        const savedItems = JSON.parse(localStorage.getItem('myCustomLexicon') || '[]');
                        savedItems.unshift(newItem);
                        localStorage.setItem('myCustomLexicon', JSON.stringify(savedItems));
                        alert("データベースに保存したよ！");
                        this.displayItem.isAIResult = false;
                    } catch(e) {
                        alert("保存に失敗しました！");
                    }
                },

                deleteItem(id) {
                    if (!confirm("この項目を削除してもいい？")) return;
                    
                    this.dictionary = this.dictionary.filter(item => item.id !== id);
                    
                    try {
                        const savedItems = JSON.parse(localStorage.getItem('myCustomLexicon') || '[]');
                        const newSavedItems = savedItems.filter(item => item.id !== id);
                        localStorage.setItem('myCustomLexicon', JSON.stringify(newSavedItems));
                        
                        if (this.displayItem && this.displayItem.id === id) {
                            this.displayItem = null;
                        }
                    } catch(e) {}
                },

                exportJSON() {
                    const savedItems = localStorage.getItem('myCustomLexicon') || '[]';
                    const blob = new Blob([savedItems], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'my_lexicon.json';
                    a.click();
                    URL.revokeObjectURL(url);
                },

                importJSON(event) {
                    const file = event.target.files[0];
                    if (!file) return;
                    
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const importedData = JSON.parse(e.target.result);
                            if (Array.isArray(importedData)) {
                                const currentSaved = JSON.parse(localStorage.getItem('myCustomLexicon') || '[]');
                                const merged = [...importedData, ...currentSaved];
                                
                                const uniqueData = Array.from(new Map(merged.map(item => [item.id, item])).values());
                                
                                localStorage.setItem('myCustomLexicon', JSON.stringify(uniqueData));
                                this.dictionary = [...uniqueData, ...this.backupData];
                                alert("データのインポートに成功したよ！");
                            } else {
                                alert("無効なJSONファイル形式です。");
                            }
                        } catch (err) {
                            alert("JSONファイルの読み込みに失敗しました。");
                        }
                    };
                    reader.readAsText(file);
                }
            }));
        });
    </script>
</body>
</html>
