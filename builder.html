<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CodeBuilder - AI Template Hub</title>
    
    <link rel="icon" href="https://img.icons8.com/fluency/48/source-code.png" type="image/png">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/144/source-code.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        [x-cloak] { display: none !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
        body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 font-sans h-screen flex flex-col" x-data="builderApp">

    <header class="bg-gradient-to-r from-emerald-800 to-teal-900 text-white p-4 shadow-xl shrink-0 z-50">
        <div class="container mx-auto flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <a href="index.html" class="bg-white/10 hover:bg-white/20 text-white px-3 py-1.5 rounded-lg text-sm font-bold transition flex items-center gap-1 border border-white/20 shadow-sm" title="解析ツールへ戻る">
                    <span>⬅️</span> 📖 Lexicon
                </a>
                
                <h1 class="text-2xl font-black italic tracking-tighter flex items-center gap-2">
                    <span class="bg-teal-500 text-white px-2 py-1 rounded text-xl">🛠️</span>
                    CODE<span class="text-teal-400">BUILDER</span>
                </h1>
            </div>
            
            <div class="flex items-center gap-4 flex-1 justify-end min-w-[300px]">
                <div class="flex flex-col items-end">
                    <span class="text-[10px] text-teal-200">Gemini API Key:</span>
                    <input type="password" x-model="apiKey" class="bg-white/10 border border-white/20 p-2 rounded text-white text-xs focus:bg-white/20 outline-none w-full max-w-[200px]" placeholder="APIキーをセット...">
                </div>
                <div class="flex gap-2">
                    <button @click="exportJSON()" class="bg-white/10 hover:bg-white/20 p-2.5 rounded shadow transition" title="テンプレのバックアップ(JSON)">📤</button>
                    <button @click="$refs.fileInput.click()" class="bg-white/10 hover:bg-white/20 p-2.5 rounded shadow transition" title="テンプレの読み込み(JSON)">📥</button>
                    <input type="file" x-ref="fileInput" @change="importJSON($event)" class="hidden" accept=".json">
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-hidden container mx-auto flex flex-col lg:flex-row gap-6 p-4">
        
        <aside class="w-full lg:w-1/3 flex flex-col gap-4 h-full">
            
            <div class="bg-white rounded-2xl p-5 shadow-lg border border-slate-200 shrink-0 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-16 h-16 bg-gradient-to-br from-teal-400/20 to-emerald-500/20 rounded-bl-full pointer-events-none"></div>
                <h3 class="font-bold text-sm mb-3 flex items-center gap-2 text-slate-800">
                    <span class="text-teal-500">✨</span> AIにテンプレを作らせる
                </h3>
                <textarea x-model="aiPrompt" class="w-full h-20 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-teal-500 resize-none mb-3 custom-scrollbar" placeholder="例：レスポンシブなナビゲーションバーのHTMLとCSSを作って"></textarea>
                <button @click="generateTemplate()" :disabled="isGenerating || !aiPrompt" class="w-full bg-teal-600 hover:bg-teal-500 disabled:bg-slate-400 text-white font-bold py-2.5 rounded-xl transition shadow flex items-center justify-center gap-2 active:scale-95">
                    <span x-show="!isGenerating">🪄 テンプレを生成 (3-flash-preview)</span>
                    <span x-show="isGenerating" class="flex items-center gap-2">
                        <svg class="animate-spin h-4 w-4 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        AIがコーディング中...
                    </span>
                </button>
            </div>

            <div class="bg-white rounded-2xl shadow-lg border border-slate-200 flex flex-col flex-1 overflow-hidden">
                <div class="p-4 bg-slate-50 border-b space-y-3 shrink-0">
                    <div class="flex justify-between items-center">
                        <h2 class="font-black text-slate-700">Templates</h2>
                        <span class="text-[10px] bg-teal-100 text-teal-700 px-2 py-1 rounded-full font-bold" x-text="templates.length + ' 種類'"></span>
                    </div>
                    <div class="flex gap-2">
                        <select x-model="filterLang" class="text-xs p-2 rounded-lg border bg-white outline-none flex-1 font-bold text-slate-600">
                            <option value="All">すべての言語</option>
                            <option value="HTML">HTML</option>
                            <option value="CSS">CSS</option>
                            <option value="JavaScript">JavaScript</option>
                            <option value="Python">Python</option>
                            <option value="PHP">PHP</option>
                            <option value="その他">その他</option>
                        </select>
                    </div>
                    <input type="text" x-model="searchQuery" placeholder="テンプレを検索..." class="w-full p-2 text-sm border rounded-lg focus:ring-2 focus:ring-teal-500 outline-none">
                </div>
                
                <div class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-2">
                    <template x-for="item in filteredTemplates" :key="item.id">
                        <div @click="selectTemplate(item)" 
                             class="group relative p-3 rounded-xl cursor-pointer transition border"
                             :class="selectedTemplate?.id === item.id ? 'bg-teal-50 border-teal-400 shadow-sm' : 'bg-white border-slate-100 hover:border-teal-200 hover:bg-slate-50'">
                            <div class="flex justify-between items-start mb-1">
                                <span class="text-[10px] font-black px-2 py-0.5 rounded"
                                    :class="{
                                        'bg-orange-100 text-orange-700': item.lang === 'HTML',
                                        'bg-blue-100 text-blue-700': item.lang === 'CSS',
                                        'bg-yellow-100 text-yellow-700': item.lang === 'JavaScript',
                                        'bg-indigo-100 text-indigo-700': item.lang === 'Python',
                                        'bg-purple-100 text-purple-700': item.lang === 'PHP',
                                        'bg-slate-200 text-slate-700': item.lang === 'その他' || item.lang === 'All'
                                    }" x-text="item.lang"></span>
                                <button @click.stop="deleteTemplate(item.id)" class="text-slate-300 hover:text-red-500 transition opacity-0 group-hover:opacity-100 p-1">🗑️</button>
                            </div>
                            <div class="font-bold text-slate-700 text-sm truncate" x-text="item.title"></div>
                        </div>
                    </template>
                    <div x-show="filteredTemplates.length === 0" class="p-6 text-center text-slate-400 text-sm italic">
                        テンプレが見つかりません
                    </div>
                </div>
                
                <div class="p-3 bg-slate-50 border-t shrink-0">
                    <button @click="createNew()" class="w-full border-2 border-dashed border-teal-300 text-teal-600 hover:bg-teal-50 font-bold py-2 rounded-xl transition flex items-center justify-center gap-1">
                        ➕ 手動で空のテンプレを作る
                    </button>
                </div>
            </div>
        </aside>

        <section class="w-full lg:w-2/3 bg-white rounded-2xl shadow-xl border border-slate-200 flex flex-col overflow-hidden h-full">
            
            <template x-if="selectedTemplate">
                <div class="flex flex-col h-full">
                    
                    <div class="p-4 border-b bg-slate-50 shrink-0 flex flex-wrap gap-4 justify-between items-center">
                        <div class="flex-1 min-w-[200px] flex gap-2">
                            <select x-model="selectedTemplate.lang" class="p-2 text-sm border rounded-lg font-bold bg-white focus:ring-2 focus:ring-teal-500 outline-none w-32 shrink-0">
                                <option value="HTML">HTML</option>
                                <option value="CSS">CSS</option>
                                <option value="JavaScript">JavaScript</option>
                                <option value="Python">Python</option>
                                <option value="PHP">PHP</option>
                                <option value="その他">その他</option>
                            </select>
                            <input type="text" x-model="selectedTemplate.title" class="flex-1 p-2 text-sm border rounded-lg font-bold text-slate-800 focus:ring-2 focus:ring-teal-500 outline-none" placeholder="テンプレのタイトル">
                        </div>
                        <div class="flex gap-2 shrink-0">
                            <button @click="copyCode()" class="bg-slate-700 hover:bg-slate-600 text-white text-xs font-bold px-4 py-2 rounded-lg transition shadow flex items-center gap-1 active:scale-95">
                                <span x-text="copied ? '✅ コピー済' : '📋 コピー'"></span>
                            </button>
                            <button @click="saveTemplates()" class="bg-teal-600 hover:bg-teal-500 text-white text-xs font-bold px-4 py-2 rounded-lg transition shadow flex items-center gap-1 active:scale-95">
                                💾 保存する
                            </button>
                        </div>
                    </div>

                    <div class="flex-1 relative flex flex-col" :class="showPreview ? 'h-1/2 border-b-4 border-slate-300' : 'h-full'">
                        <div class="absolute top-2 right-4 text-[10px] text-teal-400 font-mono italic select-none z-10 pointer-events-none">CODE EDITOR</div>
                        <textarea 
                            x-model="selectedTemplate.code" 
                            @input="updatePreviewDebounced()"
                            class="flex-1 w-full bg-slate-900 text-teal-300 p-5 pt-8 font-mono text-sm outline-none resize-none custom-scrollbar"
                            placeholder="ここにコードを記述..."></textarea>
                    </div>

                    <div x-show="showPreview" class="flex-1 relative bg-white flex flex-col h-1/2" x-cloak>
                        <div class="p-2 bg-slate-200 text-xs font-bold text-slate-600 flex justify-between items-center shrink-0">
                            <div class="flex items-center gap-2"><span>👀</span> ライブプレビュー</div>
                            <span class="text-[10px] font-normal text-slate-500">※HTML/CSS/JSの場合のみ表示</span>
                        </div>
                        <iframe x-ref="previewFrame" class="w-full flex-1 border-none bg-white"></iframe>
                    </div>

                </div>
            </template>

            <template x-if="!selectedTemplate">
                <div class="flex-1 flex flex-col items-center justify-center text-slate-400 p-8 text-center space-y-4">
                    <div class="text-6xl mb-2">🛠️</div>
                    <h2 class="text-xl font-bold text-slate-600">左のリストからテンプレを選ぶか、新しく作成しよう！</h2>
                    <p class="text-sm">AIに「かっこいいボタン作って！」とお願いするだけでもOKです。</p>
                </div>
            </template>

        </section>
    </main>

    <div x-show="toast.show" x-transition class="fixed bottom-6 right-6 bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl z-50 flex items-center gap-2" x-cloak>
        <span x-text="toast.icon"></span> <span class="font-bold text-sm" x-text="toast.message"></span>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('builderApp', () => ({
                apiKey: localStorage.getItem('lexicon_apikey') || '', // APIキーはLexiconと共有！
                searchQuery: '',
                filterLang: 'All',
                aiPrompt: '',
                isGenerating: false,
                selectedTemplate: null,
                copied: false,
                toast: { show: false, message: '', icon: '✅' },
                previewTimeout: null,
                
                // 🎁 Geminiがプロの目線で用意した「超便利」初期テンプレ群
                defaultTemplates: [
                    { id: 1, lang: "HTML", title: "別タブで開くリンク (aタグ)", code: "\n<a href=\"（ここにリンクを貼り付けて）\" target=\"_blank\" rel=\"noopener noreferrer\">（リンク先の名前）</a>" },
                    { id: 2, lang: "HTML", title: "レスポンシブHTML 基本骨格", code: "<!DOCTYPE html>\n<html lang=\"ja\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>ドキュメント</title>\n    <style>\n        body { font-family: sans-serif; line-height: 1.6; padding: 20px; }\n    </style>\n</head>\n<body>\n    <h1>Hello World!</h1>\n</body>\n</html>" },
                    { id: 3, lang: "CSS", title: "【スタイリッシュ】サイバーパンク風 光るボタン", code: "\n<button class=\"cyber-btn\">システム起動</button>\n\n\n<style>\n.cyber-btn {\n    background: transparent;\n    color: #0ff;\n    border: 2px solid #0ff;\n    padding: 15px 30px;\n    font-size: 1.2rem;\n    font-weight: bold;\n    text-transform: uppercase;\n    cursor: pointer;\n    box-shadow: 0 0 10px #0ff, inset 0 0 10px #0ff;\n    transition: 0.2s;\n    border-radius: 5px;\n}\n.cyber-btn:hover {\n    background: #0ff;\n    color: #000;\n    box-shadow: 0 0 20px #0ff, inset 0 0 20px #0ff;\n}\n</style>" },
                    { id: 4, lang: "CSS", title: "【スタイリッシュ】グラスモーフィズム (すりガラス風) カード", code: "\n<div class=\"glass-card\">\n  <h2>Glassmorphism</h2>\n  <p>背景が透ける、モダンで美しいUIです。</p>\n</div>\n\n\n<style>\nbody {\n  background: linear-gradient(45deg, #ff6b6b, #4ecdc4);\n  height: 100vh; display: flex; align-items: center; justify-content: center;\n}\n/* ここからがテンプレ本体 */\n.glass-card {\n    background: rgba(255, 255, 255, 0.2);\n    backdrop-filter: blur(10px);\n    -webkit-backdrop-filter: blur(10px);\n    border: 1px solid rgba(255, 255, 255, 0.3);\n    border-radius: 15px;\n    padding: 30px;\n    color: white;\n    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);\n    max-w-md;\n}\n</style>" },
                    { id: 5, lang: "JavaScript", title: "Fetch API (JSONデータ取得の基本)", code: "async function fetchData() {\n    try {\n        // APIのURLを指定\n        const response = await fetch('https://jsonplaceholder.typicode.com/posts/1');\n        if (!response.ok) throw new Error('ネットワークエラー');\n        \n        const data = await response.json();\n        console.log('取得成功:', data);\n    } catch (error) {\n        console.error('取得失敗:', error);\n    }\n}\n\nfetchData();" },
                    { id: 6, lang: "JavaScript", title: "要素のスムーススクロール", code: "document.querySelectorAll('a[href^=\"#\"]').forEach(anchor => {\n    anchor.addEventListener('click', function (e) {\n        e.preventDefault();\n        const target = document.querySelector(this.getAttribute('href'));\n        if(target) {\n            target.scrollIntoView({\n                behavior: 'smooth'\n            });\n        }\n    });\n});" },
                    { id: 7, lang: "PHP", title: "PDO データベース接続 (安全なテンプレ)", code: "<?php\n$host = 'localhost';\n$db   = 'database_name'; // データベース名\n$user = 'root';          // ユーザー名\n$pass = 'password';      // パスワード\n$charset = 'utf8mb4';\n\n$dsn = \"mysql:host=$host;dbname=$db;charset=$charset\";\n$options = [\n    PDO::ATTR_ERRMODE            => PDO::ERRMODE_EXCEPTION,\n    PDO::ATTR_DEFAULT_FETCH_MODE => PDO::FETCH_ASSOC,\n    PDO::ATTR_EMULATE_PREPARES   => false,\n];\n\ntry {\n     $pdo = new PDO($dsn, $user, $pass, $options);\n     // エコーはテスト用。本番では消すこと。\n     echo \"データベース接続成功！\";\n} catch (\\PDOException $e) {\n     throw new \\PDOException($e->getMessage(), (int)$e->getCode());\n}\n?>" },
                    { id: 8, lang: "Python", title: "requestsモジュールでAPIを叩く", code: "import requests\n\ndef get_api_data(url):\n    try:\n        response = requests.get(url)\n        response.raise_for_status() # エラーなら例外を発生\n        return response.json()\n    except requests.exceptions.RequestException as e:\n        print(f\"通信エラーが発生しました: {e}\")\n        return None\n\n# 使い方\ndata = get_api_data('https://api.github.com')\nif data:\n    print(data)" },
                    { id: 9, lang: "Python", title: "ファイルの安全な読み書き (with構文)", code: "# 書き込み\nwith open('data.txt', 'w', encoding='utf-8') as file:\n    file.write('こんにちは、Python！\\n')\n    file.write('ファイル書き込みのテストです。\\n')\n\n# 読み込み\nwith open('data.txt', 'r', encoding='utf-8') as file:\n    content = file.read()\n    print(content)" }
                ],
                templates: [],

                init() {
                    // APIキーの同期
                    this.$watch('apiKey', val => {
                        localStorage.setItem('lexicon_apikey', val);
                    });

                    // 保存されたテンプレの読み込み
                    const saved = JSON.parse(localStorage.getItem('myCodeTemplates') || '[]');
                    if (saved.length === 0) {
                        this.templates = [...this.defaultTemplates];
                        this.saveTemplates(); // 初回起動時はデフォルトを保存
                    } else {
                        this.templates = saved;
                    }

                    // 選択中のテンプレが変わったらプレビューを更新
                    this.$watch('selectedTemplate', () => this.updatePreviewDebounced());
                },

                get filteredTemplates() {
                    const q = this.searchQuery.toLowerCase();
                    return this.templates.filter(t => {
                        const matchLang = this.filterLang === 'All' || t.lang === this.filterLang;
                        const matchText = t.title.toLowerCase().includes(q) || t.code.toLowerCase().includes(q);
                        return matchLang && matchText;
                    });
                },

                get showPreview() {
                    if (!this.selectedTemplate) return false;
                    return ['HTML', 'CSS', 'JavaScript'].includes(this.selectedTemplate.lang);
                },

                selectTemplate(item) {
                    this.selectedTemplate = item; // 参照をそのまま渡して直接編集させる
                },

                createNew() {
                    const newTemp = {
                        id: Date.now(),
                        lang: "HTML",
                        title: "新しいテンプレート",
                        code: ""
                    };
                    this.templates.unshift(newTemp);
                    this.selectedTemplate = this.templates[0];
                    this.showToast("新規作成しました");
                },

                deleteTemplate(id) {
                    if (!confirm("本当にこのテンプレを削除する？")) return;
                    this.templates = this.templates.filter(t => t.id !== id);
                    if (this.selectedTemplate && this.selectedTemplate.id === id) {
                        this.selectedTemplate = null;
                    }
                    this.saveTemplates(false); // 通知なしで保存
                    this.showToast("削除しました", "🗑️");
                },

                saveTemplates(showNotif = true) {
                    localStorage.setItem('myCodeTemplates', JSON.stringify(this.templates));
                    if (showNotif) this.showToast("テンプレを保存したよ！", "💾");
                },

                copyCode() {
                    if(!this.selectedTemplate || !this.selectedTemplate.code) return;
                    navigator.clipboard.writeText(this.selectedTemplate.code).then(() => {
                        this.copied = true;
                        setTimeout(() => this.copied = false, 2000);
                    });
                },

                // 🚀 プレビューの遅延更新（入力するたびにカクつかないように）
                updatePreviewDebounced() {
                    if (!this.showPreview) return;
                    clearTimeout(this.previewTimeout);
                    this.previewTimeout = setTimeout(() => this.renderPreview(), 500);
                },

                renderPreview() {
                    if (!this.$refs.previewFrame || !this.selectedTemplate) return;
                    const iframe = this.$refs.previewFrame;
                    const doc = iframe.contentDocument || iframe.contentWindow.document;
                    
                    let htmlContent = this.selectedTemplate.code;

                    // CSS単体の場合、見やすくするためにHTMLのガワを被せる
                    if (this.selectedTemplate.lang === 'CSS') {
                        if (!htmlContent.includes('<html')) {
                            htmlContent = `
                                <!DOCTYPE html><html><head><style>${this.selectedTemplate.code}</style></head>
                                <body>
                                    <div style="padding:20px; text-align:center; font-family:sans-serif; color:#666;">
                                        (CSSプレビュー用ダミー画面)<br><br>
                                        ${this.selectedTemplate.code.includes('<') ? this.selectedTemplate.code : '<div class="preview-target">Target Element</div>'}
                                    </div>
                                </body></html>`;
                        }
                    }

                    // JavaScript単体の場合
                    if (this.selectedTemplate.lang === 'JavaScript') {
                        if (!htmlContent.includes('<script>')) {
                             htmlContent = `
                                <!DOCTYPE html><html><body>
                                <div style="padding:20px; font-family:sans-serif;">
                                    <h3>JS実行プレビュー</h3>
                                    <p style="font-size:12px;color:#666;">※コンソール出力(console.log)はブラウザの開発者ツール(F12)で確認してね。</p>
                                </div>
                                <script>${this.selectedTemplate.code}<\/script>
                                </body></html>`;
                        }
                    }

                    doc.open();
                    doc.write(htmlContent);
                    doc.close();
                },

                // 🪄 指定された「gemini-3-flash-preview」でAI生成
                async generateTemplate() {
                    if (!this.apiKey) return alert("右上にAPIキーを入力してね！(Lexiconと同じでOKだよ)");
                    this.isGenerating = true;

                    try {
                        const prompt = `あなたはプロのプログラマーです。以下の要望に応える再利用可能なコードテンプレートを作成してください。
                        要望: ${this.aiPrompt}
                        
                        以下のフォーマットで正確に出力してください（余計な挨拶は不要です）。
                        
                        【言語】: (HTML, CSS, JavaScript, Python, PHP, その他のいずれか)
                        【タイトル】: (テンプレートのわかりやすい短い名前)
                        【コード】:
                        (ここにコード本体を記述。マークダウンの\`\`\`などは不要で、直接コードを書いてください)`;

                        // ※API仕様に基づき、ユーザーの要望通りモデル名を指定
                        const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${this.apiKey}`;
                        
                        const response = await fetch(apiUrl, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                        });

                        if (!response.ok) {
                            const errorData = await response.json();
                            throw new Error(errorData.error?.message || `HTTP ${response.status}`);
                        }

                        const data = await response.json();
                        const text = data.candidates[0].content.parts[0].text;

                        // テキストのパース処理
                        const langMatch = text.match(/【言語】:\s*(.*)/);
                        const titleMatch = text.match(/【タイトル】:\s*(.*)/);
                        let codeContent = "";
                        
                        if (text.includes('【コード】:')) {
                            codeContent = text.split('【コード】:')[1].trim();
                        } else {
                            codeContent = text; // フォールバック
                        }
                        
                        // 余計なマークダウン（```html など）を取り除く
                        codeContent = codeContent.replace(/^```[\w]*\n/gm, '').replace(/```$/gm, '').trim();

                        const newTemp = {
                            id: Date.now(),
                            lang: langMatch ? langMatch[1].trim() : "その他",
                            title: titleMatch ? titleMatch[1].trim() : "AI生成テンプレート",
                            code: codeContent
                        };

                        this.templates.unshift(newTemp);
                        this.selectedTemplate = this.templates[0];
                        this.saveTemplates(false);
                        
                        this.aiPrompt = '';
                        this.showToast("AIがテンプレを生成しました！", "✨");

                    } catch (e) {
                        alert("AI生成に失敗しました: " + e.message + "\n※モデル名「gemini-3-flash-preview」がAPIキーの権限で使えない場合は、Lexiconと同じ2.5-flashなどに書き換えて試してみてね！");
                    } finally {
                        this.isGenerating = false;
                    }
                },

                // データのバックアップ関連
                exportJSON() {
                    const data = JSON.stringify(this.templates, null, 2);
                    const blob = new Blob([data], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'codebuilder_templates.json';
                    a.click();
                    URL.revokeObjectURL(url);
                },

                importJSON(event) {
                    const file = event.target.files[0];
                    if (!file) return;
                    
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const importedData = JSON.parse(e.target.result);
                            if (Array.isArray(importedData)) {
                                // 既存のデータと結合し、重複IDを排除
                                const merged = [...importedData, ...this.templates];
                                const uniqueData = Array.from(new Map(merged.map(item => [item.id, item])).values());
                                
                                this.templates = uniqueData;
                                this.saveTemplates(false);
                                this.showToast("テンプレを読み込みました！");
                            } else {
                                alert("無効なJSONファイルです。");
                            }
                        } catch (err) {
                            alert("ファイルの読み込みに失敗しました。");
                        }
                    };
                    reader.readAsText(file);
                },

                showToast(msg, icon = '✅') {
                    this.toast.message = msg;
                    this.toast.icon = icon;
                    this.toast.show = true;
                    setTimeout(() => this.toast.show = false, 3000);
                }
            }));
        });
    </script>
</body>
</html>
